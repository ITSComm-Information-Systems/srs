<table style="table-layout: fixed;" class="table table-hover table-striped table-sm">

    <thead>
        <tr>
            <th style="width: 120px;">Created</th>
            <th style="width: 120px;">Subject</th>
            <th style="width: 120px;">Author</th>
            <th scope="col">Body</th>
        </tr>
    </thead>
    <tbody>
        {% for record in estimate.note_list %}
        <tr>
            <td>{{ record.note_creation_date }}</td>
            <td>{{ record.note_subject }}</td>
            <td>{{ record.note_author }}</td>
            <td>{{ record.note_body|safe }}</td>
</td>
        </tr>
        {% endfor %}
    </tbody>

</table>
